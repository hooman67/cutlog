<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="36" fill="#0a0a0f"/>
  <defs>
    <linearGradient id="beam1" x1="90" y1="12" x2="90" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="90" cy="95" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Converging beam lines - wider and taller -->
  <polygon points="58,12 90,95 70,95" fill="url(#beam1)" opacity="0.6"/>
  <polygon points="122,12 90,95 110,95" fill="url(#beam1)" opacity="0.6"/>
  <!-- Outer beam edges for more drama -->
  <polygon points="50,12 90,95 66,95" fill="url(#beam1)" opacity="0.3"/>
  <polygon points="130,12 90,95 114,95" fill="url(#beam1)" opacity="0.3"/>
  <!-- Center beam -->
  <line x1="90" y1="12" x2="90" y2="95" stroke="#10b981" stroke-width="3" opacity="0.9"/>
  <!-- Focal glow -->
  <circle cx="90" cy="95" r="35" fill="url(#glow1)"/>
  <circle cx="90" cy="95" r="6" fill="#ffffff"/>
  <!-- Material surface line -->
  <line x1="20" y1="120" x2="160" y2="120" stroke="#3f3f46" stroke-width="2.5"/>
  <!-- Cut groove -->
  <line x1="55" y1="120" x2="125" y2="120" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
  <!-- Sparks -->
  <circle cx="74" cy="84" r="2.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="108" cy="80" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="80" cy="78" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="100" cy="75" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="85" cy="72" r="1.5" fill="#fbbf24" opacity="0.6"/>
</svg>
